name: Daily Collect

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11 with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pipeline only depends on httpx today.
          python -m pip install httpx

      - name: Run collection pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate collected articles
        shell: bash
        run: |
          set -euo pipefail
          today="$(date -u +%Y%m%d)"
          shopt -s nullglob
          article_files=(knowledge/articles/${today}-*.json)

          if [ "${#article_files[@]}" -eq 0 ]; then
            echo "No articles generated for ${today}, skip validation."
            exit 0
          fi

          python hooks/validate_json.py "${article_files[@]}"
          python hooks/check_quality.py "${article_files[@]}"

      - name: Commit and push when data changed
        shell: bash
        run: |
          set -euo pipefail
          today="$(date -u +%Y%m%d)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A knowledge/raw knowledge/articles

          if git diff --cached --quiet; then
            echo "No new data changes. Skip commit."
            exit 0
          fi

          article_count="$(git diff --cached --name-only --diff-filter=AM -- 'knowledge/articles/*.json' | wc -l | tr -d ' ')"
          git commit -m "chore: daily collect ${article_count} articles (${today})"
          git push
